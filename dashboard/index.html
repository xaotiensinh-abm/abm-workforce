<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABM Workforce v4.0 — Control Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0f1a; --bg2: #0f1320; --card: #141925; --card2: #1a2035;
            --border: #1e2740; --border2: #2a3555;
            --text: #e8eaf0; --dim: #8892a8; --dim2: #5a6580;
            --red: #ef4444; --green: #10b981; --blue: #3b82f6;
            --purple: #8b5cf6; --gold: #f59e0b; --pink: #ec4899;
            --cyan: #06b6d4; --orange: #f97316; --teal: #14b8a6;
            --abm: #ff2d55; --r: 14px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter',system-ui,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
        .layout { display:flex; min-height:100vh; }

        /* SIDEBAR */
        .sidebar { width:240px; background:var(--bg2); border-right:1px solid var(--border); position:fixed; top:0; left:0; bottom:0; z-index:50; display:flex; flex-direction:column; transition:transform .3s; }
        .sidebar-brand { padding:18px 16px 14px; border-bottom:1px solid var(--border); }
        .sidebar-brand h1 { font-size:16px; font-weight:900; background:linear-gradient(135deg,var(--abm),var(--gold)); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
        .sidebar-brand .ver { font-size:9px; font-weight:700; color:var(--abm); background:rgba(255,45,85,.1); padding:2px 8px; border-radius:10px; display:inline-block; margin-top:3px; }
        .sidebar-nav { flex:1; overflow-y:auto; padding:8px 6px; }
        .sidebar-nav::-webkit-scrollbar { width:3px; }
        .sidebar-nav::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
        .sidebar-section { font-size:8px; font-weight:700; color:var(--dim2); text-transform:uppercase; letter-spacing:1.5px; padding:12px 10px 4px; }
        .sidebar-item { display:flex; align-items:center; gap:8px; padding:7px 10px; margin:1px 0; border-radius:8px; cursor:pointer; font-size:12px; font-weight:500; color:var(--dim); transition:all .2s; position:relative; }
        .sidebar-item:hover { background:rgba(255,255,255,.04); color:var(--text); }
        .sidebar-item.active { background:linear-gradient(135deg,rgba(255,45,85,.12),rgba(255,45,85,.05)); color:var(--abm); font-weight:700; }
        .sidebar-item.active::before { content:''; position:absolute; left:0; top:5px; bottom:5px; width:3px; border-radius:0 3px 3px 0; background:var(--abm); }
        .sidebar-icon { font-size:14px; width:20px; text-align:center; flex-shrink:0; }
        .sidebar-badge { margin-left:auto; background:rgba(255,255,255,.08); color:var(--dim); font-size:9px; font-weight:700; padding:1px 6px; border-radius:8px; min-width:20px; text-align:center; }
        .sidebar-item.active .sidebar-badge { background:rgba(255,45,85,.15); color:var(--abm); }
        .sidebar-footer { padding:12px; border-top:1px solid var(--border); font-size:9px; color:var(--dim2); text-align:center; }

        /* MAIN */
        .main { flex:1; margin-left:240px; padding:20px 24px; min-height:100vh; }

        /* PAGE HEADER */
        .page-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
        .page-title { font-size:20px; font-weight:800; display:flex; align-items:center; gap:8px; }
        .page-subtitle { font-size:11px; color:var(--dim); margin-top:2px; }
        .page-time { font-size:10px; color:var(--dim); background:var(--card); padding:5px 12px; border-radius:8px; border:1px solid var(--border); }

        /* STATS ROW */
        .stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:12px; margin-bottom:20px; }
        .stat { background:var(--card); border:1px solid var(--border); border-radius:var(--r); padding:14px; position:relative; overflow:hidden; transition:all .3s; text-align:center; }
        .stat::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:var(--c,var(--abm)); }
        .stat:hover { transform:translateY(-2px); border-color:var(--border2); box-shadow:0 8px 20px rgba(0,0,0,.2); }
        .stat-n { font-size:24px; font-weight:900; color:var(--c,var(--abm)); line-height:1; }
        .stat-l { font-size:9px; color:var(--dim); text-transform:uppercase; letter-spacing:1px; margin-top:3px; font-weight:600; }

        /* GRID */
        .grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:20px; }
        .grid-full { grid-column:1/-1; }

        /* CARD */
        .card { background:var(--card); border:1px solid var(--border); border-radius:var(--r); overflow:hidden; }
        .card-head { padding:14px 18px; border-bottom:1px solid var(--border); font-size:13px; font-weight:700; display:flex; align-items:center; gap:8px; }
        .card-body { padding:14px 18px; max-height:380px; overflow-y:auto; }
        .card-body::-webkit-scrollbar { width:3px; }
        .card-body::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

        /* DEPT CARDS */
        .dept-cards { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:12px; margin-bottom:20px; }
        .dept-card { background:var(--card); border:1px solid var(--border); border-radius:var(--r); padding:16px; cursor:pointer; transition:all .3s; position:relative; overflow:hidden; }
        .dept-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:var(--c); }
        .dept-card:hover { transform:translateY(-2px); border-color:var(--border2); box-shadow:0 8px 24px rgba(0,0,0,.25); }
        .dept-card-head { display:flex; align-items:center; gap:8px; margin-bottom:10px; }
        .dept-card-icon { font-size:20px; width:36px; height:36px; display:flex; align-items:center; justify-content:center; border-radius:10px; background:rgba(255,255,255,.04); }
        .dept-card-title { font-size:13px; font-weight:700; }
        .dept-card-agent { font-size:9px; color:var(--dim); }
        .dept-card-stats { display:flex; gap:14px; }
        .dept-card-stat-n { font-size:18px; font-weight:800; color:var(--c); }
        .dept-card-stat-l { font-size:8px; color:var(--dim); text-transform:uppercase; }
        .dept-card-bar { margin-top:10px; height:3px; background:rgba(255,255,255,.06); border-radius:2px; overflow:hidden; }
        .dept-card-bar-fill { height:100%; border-radius:2px; transition:width .8s ease; }

        /* TABLE */
        table { width:100%; border-collapse:collapse; font-size:11px; }
        th { text-align:left; padding:8px 10px; color:var(--dim); font-weight:700; text-transform:uppercase; font-size:9px; letter-spacing:1px; border-bottom:1px solid var(--border); }
        td { padding:8px 10px; border-bottom:1px solid rgba(255,255,255,.03); }
        tr:hover td { background:rgba(255,255,255,.02); }
        .badge { display:inline-block; padding:2px 8px; border-radius:8px; font-size:9px; font-weight:700; }
        .badge-done { background:rgba(16,185,129,.12); color:var(--green); }
        .badge-progress { background:rgba(59,130,246,.12); color:var(--blue); }
        .badge-blocked { background:rgba(239,68,68,.12); color:var(--red); }
        .skill-tag { display:inline-block; padding:1px 5px; margin:1px; border-radius:4px; font-size:8px; font-weight:600; background:rgba(139,92,246,.08); color:var(--purple); }
        .prog-bar { width:70px; height:4px; background:rgba(255,255,255,.06); border-radius:2px; overflow:hidden; display:inline-block; vertical-align:middle; margin-right:4px; }
        .prog-fill { height:100%; border-radius:2px; }

        /* CHART */
        .chart-bar { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
        .chart-label { font-size:10px; width:100px; color:var(--dim); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-weight:500; }
        .chart-track { flex:1; height:20px; background:rgba(255,255,255,.04); border-radius:5px; overflow:hidden; }
        .chart-fill { height:100%; border-radius:5px; transition:width .8s ease; display:flex; align-items:center; padding-left:8px; font-size:9px; font-weight:700; min-width:24px; }
        .chart-val { font-size:10px; font-weight:700; width:24px; text-align:right; color:var(--dim); }

        /* TIMELINE */
        .timeline { position:relative; padding-left:20px; }
        .timeline::before { content:''; position:absolute; left:6px; top:4px; bottom:4px; width:2px; background:linear-gradient(to bottom,var(--abm),var(--purple),var(--blue)); border-radius:1px; }
        .tl-item { position:relative; margin-bottom:14px; padding-left:14px; }
        .tl-item::before { content:''; position:absolute; left:-17px; top:5px; width:8px; height:8px; border-radius:50%; border:2px solid var(--green); background:var(--bg); }
        .tl-date { font-size:9px; color:var(--dim2); font-weight:600; }
        .tl-title { font-size:11px; font-weight:600; }
        .tl-detail { font-size:10px; color:var(--dim); margin-top:1px; }

        /* HEALTH */
        .health-row { display:flex; align-items:center; gap:8px; padding:6px 0; }
        .h-dot { width:7px; height:7px; border-radius:50%; animation:pulse 2s infinite; flex-shrink:0; }
        @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.8)} }
        .h-label { font-size:10px; color:var(--dim); flex:1; }
        .h-val { font-size:10px; font-weight:700; }

        /* SCORE */
        .score-section { display:flex; align-items:center; gap:24px; padding:16px; }
        .score-circle { width:80px; height:80px; border-radius:50%; border:3px solid var(--green); display:flex; flex-direction:column; align-items:center; justify-content:center; flex-shrink:0; background:rgba(16,185,129,.03); }
        .score-big { font-size:26px; font-weight:900; color:var(--green); line-height:1; }
        .score-sub { font-size:8px; color:var(--dim); font-weight:700; }
        .score-bars { flex:1; }
        .sb-row { display:flex; align-items:center; gap:6px; margin-bottom:4px; }
        .sb-label { font-size:9px; width:75px; color:var(--dim); font-weight:500; }
        .sb-track { flex:1; height:4px; background:rgba(255,255,255,.05); border-radius:2px; overflow:hidden; }
        .sb-fill { height:100%; border-radius:2px; }
        .sb-val { font-size:9px; font-weight:700; width:20px; text-align:right; }

        /* DAILY */
        .daily-summary { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:16px; }
        .daily-stat { background:var(--card); border:1px solid var(--border); border-radius:var(--r); padding:16px; text-align:center; }
        .daily-stat-n { font-size:28px; font-weight:900; line-height:1; }
        .daily-stat-l { font-size:9px; color:var(--dim); text-transform:uppercase; letter-spacing:1px; margin-top:3px; font-weight:600; }
        .daily-text { background:var(--card); border:1px solid var(--border); border-radius:var(--r); padding:16px; margin-bottom:16px; font-size:12px; line-height:1.7; color:var(--dim); }
        .daily-text strong { color:var(--text); }
        .date-picker { background:var(--card); border:1px solid var(--border); color:var(--text); padding:6px 12px; border-radius:8px; font-family:inherit; font-size:12px; font-weight:600; cursor:pointer; }
        .date-picker::-webkit-calendar-picker-indicator { filter:invert(1); }

        /* TASK DETAIL MODAL */
        .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:100; backdrop-filter:blur(4px); }
        .modal-overlay.show { display:block; }
        .modal-panel { position:fixed; top:0; right:-520px; bottom:0; width:500px; max-width:90vw; background:var(--bg2); border-left:1px solid var(--border); z-index:101; overflow-y:auto; transition:right .3s ease; box-shadow:-8px 0 32px rgba(0,0,0,.4); }
        .modal-panel.show { right:0; }
        .modal-panel::-webkit-scrollbar { width:4px; }
        .modal-panel::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
        .modal-close { position:absolute; top:16px; right:16px; background:rgba(255,255,255,.06); border:1px solid var(--border); color:var(--dim); width:32px; height:32px; border-radius:8px; cursor:pointer; font-size:14px; display:flex; align-items:center; justify-content:center; transition:all .2s; }
        .modal-close:hover { background:rgba(255,45,85,.15); color:var(--abm); }
        .modal-header { padding:24px 24px 16px; border-bottom:1px solid var(--border); }
        .modal-id { font-size:10px; font-weight:700; color:var(--abm); text-transform:uppercase; letter-spacing:1px; }
        .modal-title { font-size:16px; font-weight:800; margin-top:4px; line-height:1.3; }
        .modal-meta { display:flex; gap:12px; flex-wrap:wrap; margin-top:8px; }
        .modal-meta-item { font-size:10px; color:var(--dim); display:flex; align-items:center; gap:4px; }
        .modal-body { padding:20px 24px; }
        .modal-section { margin-bottom:18px; }
        .modal-section-title { font-size:10px; font-weight:700; color:var(--dim2); text-transform:uppercase; letter-spacing:1.5px; margin-bottom:8px; display:flex; align-items:center; gap:6px; }
        .modal-desc { font-size:12px; line-height:1.7; color:var(--dim); }
        .modal-result { font-size:12px; line-height:1.5; color:var(--green); background:rgba(16,185,129,.06); padding:10px 14px; border-radius:8px; border-left:3px solid var(--green); }
        .modal-file { font-size:11px; padding:4px 10px; margin:2px 0; background:rgba(255,255,255,.03); border-radius:6px; color:var(--cyan); font-family:'Consolas','Courier New',monospace; display:block; }
        .modal-decision { font-size:11px; padding:6px 12px; margin:3px 0; background:rgba(139,92,246,.06); border-radius:6px; color:var(--text); border-left:3px solid var(--purple); }
        .modal-evidence { font-size:11px; line-height:1.6; color:var(--dim); background:rgba(255,255,255,.03); padding:10px 14px; border-radius:8px; }
        .modal-skills { display:flex; flex-wrap:wrap; gap:4px; }
        .modal-skill { display:inline-block; padding:3px 10px; border-radius:6px; font-size:10px; font-weight:600; background:rgba(139,92,246,.1); color:var(--purple); }

        /* MOBILE */
        .mobile-toggle { display:none; position:fixed; top:12px; left:12px; z-index:60; background:var(--card); border:1px solid var(--border); padding:6px 8px; border-radius:6px; cursor:pointer; color:var(--text); font-size:16px; }
        .sidebar-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:45; }
        @media(max-width:900px) {
            .sidebar { transform:translateX(-100%); }
            .sidebar.open { transform:translateX(0); }
            .sidebar-overlay.show { display:block; }
            .main { margin-left:0; padding:14px; padding-top:50px; }
            .mobile-toggle { display:block; }
            .grid { grid-template-columns:1fr; }
            .stats { grid-template-columns:repeat(3,1fr); }
            .daily-summary { grid-template-columns:repeat(2,1fr); }
            .dept-cards { grid-template-columns:1fr; }
            .score-section { flex-direction:column; }
        }

        .fade-in { animation:fadeUp .4s ease both; }
        @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
        .view { display:none; }
        .view.active { display:block; }
    </style>
</head>
<body>
<button class="mobile-toggle" onclick="toggleSidebar()">☰</button>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<!-- TASK DETAIL MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeTaskDetail()"></div>
<div class="modal-panel" id="modalPanel">
    <button class="modal-close" onclick="closeTaskDetail()">✕</button>
    <div id="modalContent"></div>
</div>

<div class="layout">
    <!-- SIDEBAR — 11 Phòng Ban -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <h1>🧠 ABM Workforce</h1>
            <span class="ver">v4.0 · 11 Phòng Ban</span>
        </div>
        <nav class="sidebar-nav" id="sidebarNav">
            <!-- Generated by JS -->
        </nav>
        <div class="sidebar-footer">
            <div><strong style="color:var(--abm)">ABM v4.0</strong> · <span id="sidebarSync">—</span></div>
        </div>
    </aside>

    <main class="main">
        <!-- OVERVIEW -->
        <div class="view active" id="view-overview">
            <div class="page-header">
                <div><div class="page-title">📊 Tổng Quan — 11 Phòng Ban</div><div class="page-subtitle">Dashboard điều phối toàn bộ ABM Workforce</div></div>
                <div class="page-time" id="headerTime">—</div>
            </div>
            <div class="stats fade-in" id="overviewStats"></div>
            <div class="dept-cards fade-in" id="deptCards"></div>
            <div class="grid">
                <div class="card"><div class="card-head">📅 Timeline Gần Nhất</div><div class="card-body" id="timeline"></div></div>
                <div class="card"><div class="card-head">💚 Health Status</div><div class="card-body" id="healthPanel"></div></div>
                <div class="card"><div class="card-head">📊 Audit Score</div><div class="score-section" id="scoreSection"></div></div>
                <div class="card"><div class="card-head">🧩 Top Skills</div><div class="card-body" id="topSkills"></div></div>
            </div>
        </div>

        <!-- Department views — generated dynamically -->
        <div class="view" id="view-daily"></div>
        <div class="view" id="view-analytics"></div>
    </main>
</div>

<script src="task-data.js"></script>
<script>
// =============================================
// ABM Dashboard v4.0 — 11 Phòng Ban Engine
// =============================================

let TASKS = [];

// === 11 PHÒNG BAN ĐẦY ĐỦ ===
const DEPTS = [
    { key:'bgd',       label:'Ban Giám Đốc',   icon:'👔', color:'#ef4444', agent:'Jarvis Orchestrator',  match:['Ban Giám Đốc'] },
    { key:'marketing', label:'Marketing',       icon:'📢', color:'#3b82f6', agent:'marketing-specialist', match:['Marketing'] },
    { key:'sales',     label:'Kinh Doanh',      icon:'💰', color:'#8b5cf6', agent:'sales-specialist',     match:['Kinh Doanh'] },
    { key:'hr',        label:'HC — Nhân Sự',    icon:'👥', color:'#f59e0b', agent:'hr-specialist',        match:['HC — Nhân Sự'] },
    { key:'training',  label:'Đào Tạo',         icon:'🎓', color:'#a855f7', agent:'training-specialist',  match:['Đào Tạo'] },
    { key:'it',        label:'IT — Công Nghệ',  icon:'🌐', color:'#06b6d4', agent:'web-specialist',       match:['IT — Công Nghệ'] },
    { key:'rd',        label:'R&D',             icon:'🔬', color:'#22d3ee', agent:'rd-specialist',        match:['R&D'] },
    { key:'cskh',      label:'CSKH',            icon:'🤝', color:'#ec4899', agent:'cskh-specialist',      match:['CSKH'] },
    { key:'finance',   label:'Kế Toán',         icon:'💵', color:'#10b981', agent:'finance-analyst',      match:['Kế Toán'] },
    { key:'legal',     label:'Pháp Chế',        icon:'⚖️', color:'#14b8a6', agent:'legal-specialist',     match:['Pháp Chế'] },
    { key:'ops',       label:'Vận Hành',        icon:'⚙️', color:'#f97316', agent:'ops-specialist',       match:['Vận Hành'] }
];

const DEPT_COLORS = {};
DEPTS.forEach(d => d.match.forEach(m => DEPT_COLORS[m] = d.color));

const SCORES = [
    {name:'Kiến trúc',val:9},{name:'Quality',val:9},{name:'Coverage',val:9},
    {name:'Agents',val:9},{name:'Workflows',val:9},{name:'Context',val:9},
    {name:'Knowledge',val:9},{name:'Tracing',val:9},{name:'Security',val:9},{name:'Tiếng Việt',val:10}
];

// ===== INIT =====
function init() {
    TASKS = (typeof TASK_DATA!=='undefined' && TASK_DATA.length) ? TASK_DATA : [];
    buildSidebar();
    updateTimes();
    renderOverview();
}

function updateTimes() {
    const now = new Date().toLocaleString('vi-VN');
    const el1 = document.getElementById('headerTime'); if(el1) el1.textContent = now;
    const el2 = document.getElementById('sidebarSync'); if(el2) el2.textContent = now;
}

function getTasksForDept(dept) { return TASKS.filter(t => dept.match.includes(t.department)); }

// ===== BUILD SIDEBAR =====
function buildSidebar() {
    const nav = document.getElementById('sidebarNav');
    let html = '';
    // Tổng quan
    html += `<div class="sidebar-section">Tổng Quan</div>`;
    html += `<div class="sidebar-item active" onclick="showView('overview',this)" data-view="overview">
        <span class="sidebar-icon">📊</span> Tổng Quan
        <span class="sidebar-badge" id="badge-total">${TASKS.length}</span></div>`;

    // 11 Phòng Ban
    html += `<div class="sidebar-section">11 Phòng Ban</div>`;
    DEPTS.forEach(d => {
        const count = getTasksForDept(d).length;
        html += `<div class="sidebar-item" onclick="showView('dept-${d.key}',this)" data-view="dept-${d.key}">
            <span class="sidebar-icon">${d.icon}</span> ${d.label}
            <span class="sidebar-badge" id="badge-${d.key}">${count}</span></div>`;
        // Create view container if not exists
        if (!document.getElementById('view-dept-'+d.key)) {
            const div = document.createElement('div');
            div.className = 'view'; div.id = 'view-dept-'+d.key;
            document.querySelector('.main').appendChild(div);
        }
    });

    // Báo cáo
    html += `<div class="sidebar-section">Báo Cáo</div>`;
    html += `<div class="sidebar-item" onclick="showView('daily',this)" data-view="daily">
        <span class="sidebar-icon">📋</span> Daily Report</div>`;
    html += `<div class="sidebar-item" onclick="showView('analytics',this)" data-view="analytics">
        <span class="sidebar-icon">📈</span> Phân Tích</div>`;

    nav.innerHTML = html;
}

// ===== SHOW VIEW =====
function showView(viewId, el) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
    if (el) el.classList.add('active');
    const target = document.getElementById('view-' + viewId);
    if (target) target.classList.add('active');

    if (viewId === 'overview') renderOverview();
    else if (viewId.startsWith('dept-')) renderDeptView(viewId.replace('dept-',''));
    else if (viewId === 'daily') renderDaily();
    else if (viewId === 'analytics') renderAnalytics();

    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebarOverlay').classList.remove('show');
}

function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('sidebarOverlay').classList.toggle('show');
}

// ===== OVERVIEW =====
function renderOverview() {
    const s = typeof WORKSPACE_STATS!=='undefined'?WORKSPACE_STATS:{skills:79,workflows:20,subagents:5,workers:5};
    const done = TASKS.filter(t=>t.status==='done').length;
    const pct = TASKS.length ? Math.round(done/TASKS.length*100)+'%' : '0%';
    const activeDepts = [...new Set(TASKS.map(t=>t.department))].length;

    document.getElementById('overviewStats').innerHTML = `
        <div class="stat" style="--c:var(--abm)"><div class="stat-n">${s.skills}</div><div class="stat-l">Skills</div></div>
        <div class="stat" style="--c:var(--blue)"><div class="stat-n">${s.workflows}</div><div class="stat-l">Workflows</div></div>
        <div class="stat" style="--c:var(--purple)"><div class="stat-n">${s.subagents}</div><div class="stat-l">SubAgents</div></div>
        <div class="stat" style="--c:var(--cyan)"><div class="stat-n">${s.workers||5}</div><div class="stat-l">Workers</div></div>
        <div class="stat" style="--c:var(--gold)"><div class="stat-n">${TASKS.length}</div><div class="stat-l">Tasks</div></div>
        <div class="stat" style="--c:var(--green)"><div class="stat-n">${pct}</div><div class="stat-l">Hoàn Thành</div></div>
        <div class="stat" style="--c:var(--orange)"><div class="stat-n">${activeDepts}/11</div><div class="stat-l">PB Active</div></div>
    `;

    renderDeptCards();
    renderTimeline();
    renderHealth();
    renderScoreSection();
    renderTopSkills();
}

function renderDeptCards() {
    document.getElementById('deptCards').innerHTML = DEPTS.map(d => {
        const tasks = getTasksForDept(d);
        const done = tasks.filter(t=>t.status==='done').length;
        const pct = tasks.length ? Math.round(done/tasks.length*100) : 0;
        return `<div class="dept-card" style="--c:${d.color}" onclick="showView('dept-${d.key}',document.querySelector('[data-view=dept-${d.key}]'))">
            <div class="dept-card-head">
                <div class="dept-card-icon">${d.icon}</div>
                <div><div class="dept-card-title">${d.label}</div><div class="dept-card-agent">${d.agent}</div></div>
            </div>
            <div class="dept-card-stats">
                <div><div class="dept-card-stat-n" style="color:${d.color}">${tasks.length}</div><div class="dept-card-stat-l">Tasks</div></div>
                <div><div class="dept-card-stat-n" style="color:var(--green)">${pct}%</div><div class="dept-card-stat-l">Done</div></div>
            </div>
            <div class="dept-card-bar"><div class="dept-card-bar-fill" style="width:${pct}%;background:${d.color}"></div></div>
        </div>`;
    }).join('');
}

function renderTimeline() {
    const sorted = [...TASKS].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,8);
    document.getElementById('timeline').innerHTML = '<div class="timeline">' + sorted.map(t => `
        <div class="tl-item"><div class="tl-date">${t.date} · ${t.id}</div>
        <div class="tl-title">${t.title}</div>
        <div class="tl-detail"><span style="color:${DEPT_COLORS[t.department]||'var(--dim)'}">${t.department}</span> → ${t.agent}</div></div>
    `).join('') + '</div>';
}

function renderHealth() {
    const s = typeof WORKSPACE_STATS!=='undefined'?WORKSPACE_STATS:{skills:79,workflows:20,subagents:5};
    const items = [
        {l:'Skills Active',v:s.skills+'/'+s.skills,ok:true}, {l:'Workflows',v:s.workflows+' active',ok:true},
        {l:'SubAgents',v:s.subagents+' online',ok:true}, {l:'Workers',v:(s.workers||5)+' ready',ok:true},
        {l:'Phòng Ban',v:'11/11 mapped',ok:true}, {l:'Tiếng Việt',v:'100%',ok:true},
        {l:'Auto Setup',v:'setup.ps1 ✓',ok:true}, {l:'Dashboard',v:(s.version||'v4.0')+' LIVE',ok:true},
        {l:'Last Sync',v:s.lastSync||'—',ok:true}
    ];
    document.getElementById('healthPanel').innerHTML = items.map(h => `
        <div class="health-row"><div class="h-dot" style="background:${h.ok?'var(--green)':'var(--red)'}"></div>
        <span class="h-label">${h.l}</span><span class="h-val">${h.v}</span></div>
    `).join('');
}

function renderScoreSection() {
    const avg = (SCORES.reduce((a,s)=>a+s.val,0)/SCORES.length).toFixed(1);
    document.getElementById('scoreSection').innerHTML = `
        <div class="score-circle"><div class="score-big">${avg}</div><div class="score-sub">/ 10</div></div>
        <div class="score-bars">${SCORES.map(s => {
            const c = s.val>=9.5?'var(--green)':s.val>=9?'var(--blue)':'var(--gold)';
            return `<div class="sb-row"><span class="sb-label">${s.name}</span><div class="sb-track"><div class="sb-fill" style="width:${s.val*10}%;background:${c}"></div></div><span class="sb-val">${s.val}</span></div>`;
        }).join('')}</div>`;
}

function renderTopSkills() {
    const counts = {};
    TASKS.forEach(t=>t.skills.forEach(s=>{counts[s]=(counts[s]||0)+1}));
    const sorted = Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,10);
    const max = sorted[0]?sorted[0][1]:1;
    document.getElementById('topSkills').innerHTML = sorted.map(([n,c]) => `
        <div class="chart-bar"><span class="chart-label">${n}</span><div class="chart-track"><div class="chart-fill" style="width:${c/max*100}%;background:var(--purple)">${c}</div></div></div>
    `).join('');
}

// ===== DEPARTMENT VIEW =====
function renderDeptView(deptKey) {
    const dept = DEPTS.find(d=>d.key===deptKey);
    if (!dept) return;
    const tasks = getTasksForDept(dept);
    const done = tasks.filter(t=>t.status==='done').length;
    const inProg = tasks.filter(t=>t.status==='in_progress').length;
    const pct = tasks.length ? Math.round(done/tasks.length*100) : 0;
    const skills = {};
    tasks.forEach(t=>t.skills.forEach(s=>{skills[s]=(skills[s]||0)+1}));
    const topSk = Object.entries(skills).sort((a,b)=>b[1]-a[1]).slice(0,8);
    const maxSk = topSk[0]?topSk[0][1]:1;

    const el = document.getElementById('view-dept-'+deptKey);
    el.innerHTML = `
        <div class="page-header">
            <div><div class="page-title">${dept.icon} ${dept.label}</div>
            <div class="page-subtitle">${dept.agent} · ${tasks.length} tasks · ${Object.keys(skills).length} skills</div></div>
            <div class="page-time">${new Date().toLocaleString('vi-VN')}</div>
        </div>
        <div class="stats fade-in">
            <div class="stat" style="--c:${dept.color}"><div class="stat-n">${tasks.length}</div><div class="stat-l">Tasks</div></div>
            <div class="stat" style="--c:var(--green)"><div class="stat-n">${done}</div><div class="stat-l">Hoàn Thành</div></div>
            <div class="stat" style="--c:var(--blue)"><div class="stat-n">${inProg}</div><div class="stat-l">Đang Làm</div></div>
            <div class="stat" style="--c:var(--gold)"><div class="stat-n">${pct}%</div><div class="stat-l">Tỷ Lệ</div></div>
            <div class="stat" style="--c:var(--purple)"><div class="stat-n">${Object.keys(skills).length}</div><div class="stat-l">Skills</div></div>
        </div>
        ${tasks.length > 0 ? `
        <div class="grid">
            <div class="card grid-full">
                <div class="card-head">📋 Tasks — ${dept.label}</div>
                <div class="card-body" style="max-height:none">
                    <table><thead><tr><th>ID</th><th>Ngày</th><th>Task</th><th>Agent</th><th>Skills</th><th>%</th><th>Status</th></tr></thead>
                    <tbody>${tasks.sort((a,b)=>b.date.localeCompare(a.date)).map(taskRow).join('')}</tbody></table>
                </div>
            </div>
            <div class="card"><div class="card-head">🧩 Top Skills</div><div class="card-body">${topSk.map(([n,c])=>`
                <div class="chart-bar"><span class="chart-label">${n}</span><div class="chart-track"><div class="chart-fill" style="width:${c/maxSk*100}%;background:${dept.color}">${c}</div></div></div>
            `).join('')}</div></div>
            <div class="card"><div class="card-head">📅 Timeline</div><div class="card-body"><div class="timeline">${tasks.sort((a,b)=>b.date.localeCompare(a.date)).map(t=>`
                <div class="tl-item"><div class="tl-date">${t.date} · ${t.id}</div><div class="tl-title">${t.title}</div><div class="tl-detail">${t.result||''}</div></div>
            `).join('')}</div></div></div>
        </div>` : `
        <div class="daily-text" style="text-align:center;padding:40px">
            <span style="font-size:48px">${dept.icon}</span><br><br>
            <strong>Phòng ${dept.label} chưa có task nào.</strong><br>
            <span style="color:var(--dim)">Giao việc bằng: <code style="background:var(--card2);padding:2px 8px;border-radius:4px">/${dept.key}</code> hoặc nói với Jarvis.</span>
        </div>`}
    `;
}

function taskRow(t) {
    const sc = t.status==='done'?'badge-done':t.status==='in_progress'?'badge-progress':'badge-blocked';
    const sl = t.status==='done'?'Hoàn thành':t.status==='in_progress'?'Đang làm':'Bị chặn';
    const pc = t.completion>=100?'var(--green)':t.completion>=50?'var(--blue)':'var(--gold)';
    return `<tr style="cursor:pointer" onclick="showTaskDetail('${t.id}')">
        <td><strong>${t.id}</strong></td><td>${t.date}</td>
        <td>${t.title}<br><span style="font-size:9px;color:var(--dim)">${t.result||''}</span></td>
        <td>${t.agent}<br><span style="font-size:9px;color:var(--dim)">${t.worker}</span></td>
        <td>${t.skills.slice(0,3).map(s=>'<span class="skill-tag">'+s+'</span>').join('')}${t.skills.length>3?'<span class="skill-tag">+' + (t.skills.length-3) + '</span>':''}</td>
        <td><div class="prog-bar"><div class="prog-fill" style="width:${t.completion}%;background:${pc}"></div></div>${t.completion}%</td>
        <td><span class="badge ${sc}">${sl}</span></td></tr>`;
}

// ===== TASK DETAIL MODAL =====
function showTaskDetail(taskId) {
    const t = TASKS.find(x => x.id === taskId);
    if (!t) return;
    const dept = DEPTS.find(d => d.match.includes(t.department));
    const deptColor = dept ? dept.color : 'var(--blue)';
    const sc = t.status==='done'?'badge-done':t.status==='in_progress'?'badge-progress':'badge-blocked';
    const sl = t.status==='done'?'Hoàn thành':t.status==='in_progress'?'Đang làm':'Bị chặn';

    document.getElementById('modalContent').innerHTML = `
        <div class="modal-header">
            <div class="modal-id">${t.id} · <span class="badge ${sc}">${sl}</span></div>
            <div class="modal-title">${t.title}</div>
            <div class="modal-meta">
                <span class="modal-meta-item">📅 ${t.date}</span>
                <span class="modal-meta-item" style="color:${deptColor}">🏢 ${t.department}</span>
                <span class="modal-meta-item">🤖 ${t.agent}</span>
                <span class="modal-meta-item">👷 ${t.worker}</span>
                ${t.duration ? '<span class="modal-meta-item">⏱️ '+t.duration+' phút</span>' : ''}
                ${t.session_id ? '<span class="modal-meta-item">📋 '+t.session_id+'</span>' : ''}
            </div>
        </div>
        <div class="modal-body">
            ${t.description ? `<div class="modal-section">
                <div class="modal-section-title">📝 Mô tả chi tiết</div>
                <div class="modal-desc">${t.description}</div>
            </div>` : ''}

            <div class="modal-section">
                <div class="modal-section-title">✅ Kết quả</div>
                <div class="modal-result">${t.result || 'Chưa có kết quả'}</div>
            </div>

            ${t.files_changed && t.files_changed.length ? `<div class="modal-section">
                <div class="modal-section-title">📁 Files thay đổi (${t.files_changed.length})</div>
                ${t.files_changed.map(f => '<span class="modal-file">'+f+'</span>').join('')}
            </div>` : ''}

            ${t.decisions && t.decisions.length ? `<div class="modal-section">
                <div class="modal-section-title">💡 Quyết định quan trọng (${t.decisions.length})</div>
                ${t.decisions.map(d => '<div class="modal-decision">'+d+'</div>').join('')}
            </div>` : ''}

            ${t.evidence ? `<div class="modal-section">
                <div class="modal-section-title">🔍 Bằng chứng xác minh</div>
                <div class="modal-evidence">${t.evidence}</div>
            </div>` : ''}

            <div class="modal-section">
                <div class="modal-section-title">🧩 Skills sử dụng (${t.skills.length})</div>
                <div class="modal-skills">${t.skills.map(s => '<span class="modal-skill">'+s+'</span>').join('')}</div>
            </div>

            <div class="modal-section">
                <div class="modal-section-title">📊 Tiến độ</div>
                <div style="display:flex;align-items:center;gap:10px">
                    <div style="flex:1;height:8px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden">
                        <div style="height:100%;width:${t.completion}%;background:${t.completion>=100?'var(--green)':'var(--blue)'};border-radius:4px;transition:width .5s"></div>
                    </div>
                    <span style="font-size:14px;font-weight:800;color:${t.completion>=100?'var(--green)':'var(--blue)'}">${t.completion}%</span>
                </div>
            </div>
        </div>
    `;
    document.getElementById('modalOverlay').classList.add('show');
    document.getElementById('modalPanel').classList.add('show');
}

function closeTaskDetail() {
    document.getElementById('modalOverlay').classList.remove('show');
    document.getElementById('modalPanel').classList.remove('show');
}

// ESC key to close
document.addEventListener('keydown', e => { if(e.key==='Escape') closeTaskDetail(); });

// ===== DAILY REPORT =====
function renderDaily(dateStr) {
    const el = document.getElementById('view-daily');
    const today = dateStr || new Date().toISOString().slice(0,10);
    const dayTasks = TASKS.filter(t=>t.date===today);
    const done = dayTasks.filter(t=>t.status==='done').length;
    const prog = dayTasks.filter(t=>t.status==='in_progress').length;
    const blocked = dayTasks.filter(t=>t.status==='blocked').length;
    const deptCounts = {};
    dayTasks.forEach(t=>{deptCounts[t.department]=(deptCounts[t.department]||0)+1});
    const deptSorted = Object.entries(deptCounts).sort((a,b)=>b[1]-a[1]);
    const topDept = deptSorted[0]?deptSorted[0][0]:'—';
    const yesterday = new Date(new Date(today).getTime()-86400000).toISOString().slice(0,10);
    const yCount = TASKS.filter(t=>t.date===yesterday).length;
    const trend = dayTasks.length > yCount ? '📈 +'+(dayTasks.length-yCount)+' so với hôm qua' :
                  dayTasks.length < yCount ? '📉 '+(dayTasks.length-yCount)+' so với hôm qua' : '➡️ Bằng hôm qua';
    const allDates = [...new Set(TASKS.map(t=>t.date))].sort().reverse();

    el.innerHTML = `
        <div class="page-header"><div><div class="page-title">📋 Báo Cáo Ngày</div><div class="page-subtitle">${trend}</div></div>
            <input type="date" class="date-picker" value="${today}" onchange="renderDaily(this.value)"></div>
        <div class="daily-summary fade-in">
            <div class="daily-stat"><div class="daily-stat-n" style="color:var(--gold)">${dayTasks.length}</div><div class="daily-stat-l">Tổng Tasks</div></div>
            <div class="daily-stat"><div class="daily-stat-n" style="color:var(--green)">${done}</div><div class="daily-stat-l">Hoàn Thành</div></div>
            <div class="daily-stat"><div class="daily-stat-n" style="color:var(--blue)">${prog}</div><div class="daily-stat-l">Đang Làm</div></div>
            <div class="daily-stat"><div class="daily-stat-n" style="color:var(--red)">${blocked}</div><div class="daily-stat-l">Bị Chặn</div></div>
        </div>
        ${dayTasks.length > 0 ? `
        <div class="daily-text fade-in"><strong>📊 Tóm tắt ${today}:</strong> ${dayTasks.length} tasks, hoàn thành ${done}/${dayTasks.length} (${dayTasks.length?Math.round(done/dayTasks.length*100):0}%).
            ${topDept!=='—'?' <strong>'+topDept+'</strong> dẫn đầu với '+deptCounts[topDept]+' tasks.':''}
            ${blocked>0?'<span style="color:var(--red)">⚠️ '+blocked+' task bị chặn.</span>':'<span style="color:var(--green)">✅ Không có task bị chặn.</span>'}</div>
        <div class="card fade-in"><div class="card-head">📋 Chi tiết — ${today}</div><div class="card-body" style="max-height:none">
            <table><thead><tr><th>ID</th><th>Task</th><th>Phòng Ban</th><th>Agent</th><th>Status</th></tr></thead>
            <tbody>${dayTasks.map(t=>`<tr><td><strong>${t.id}</strong></td><td>${t.title}</td>
                <td><span style="color:${DEPT_COLORS[t.department]||'var(--text)'}">${t.department}</span></td>
                <td>${t.agent}</td><td><span class="badge ${t.status==='done'?'badge-done':'badge-progress'}">${t.status==='done'?'Hoàn thành':'Đang làm'}</span></td></tr>`).join('')}</tbody></table>
        </div></div>
        ${deptSorted.length>0?`<div class="card fade-in" style="margin-top:14px"><div class="card-head">🏢 Phòng Ban — ${today}</div><div class="card-body">${deptSorted.map(([n,c])=>`
            <div class="chart-bar"><span class="chart-label">${n}</span><div class="chart-track"><div class="chart-fill" style="width:${c/deptSorted[0][1]*100}%;background:${DEPT_COLORS[n]||'var(--blue)'}">${c}</div></div></div>`).join('')}</div></div>`:''}
        ` : `<div class="daily-text fade-in" style="text-align:center;padding:40px">
            <span style="font-size:48px">📭</span><br><br><strong>Không có task ngày ${today}.</strong><br>
            <span style="color:var(--dim)">Ngày có dữ liệu: ${allDates.slice(0,7).map(d=>`<span style="cursor:pointer;color:var(--blue);text-decoration:underline" onclick="renderDaily('${d}')">${d}</span>`).join(' · ')}</span></div>`}
    `;
}

// ===== ANALYTICS =====
function renderAnalytics() {
    const el = document.getElementById('view-analytics');
    const skillCounts={}; TASKS.forEach(t=>t.skills.forEach(s=>{skillCounts[s]=(skillCounts[s]||0)+1}));
    const topSk = Object.entries(skillCounts).sort((a,b)=>b[1]-a[1]).slice(0,12);
    const maxSk = topSk[0]?topSk[0][1]:1;
    const agents={},workers={}; TASKS.forEach(t=>{agents[t.agent]=(agents[t.agent]||0)+1;workers[t.worker]=(workers[t.worker]||0)+1});
    const agentData = [...Object.entries(agents).map(([n,c])=>({n:n+' (Agent)',c,cl:'var(--blue)'})),...Object.entries(workers).map(([n,c])=>({n:n+' (Worker)',c,cl:'var(--cyan)'}))].sort((a,b)=>b.c-a.c);
    const maxAg = agentData[0]?agentData[0].c:1;
    const deptCounts={}; TASKS.forEach(t=>{deptCounts[t.department]=(deptCounts[t.department]||0)+1});
    const deptSorted = Object.entries(deptCounts).sort((a,b)=>b[1]-a[1]);
    const maxD = deptSorted[0]?deptSorted[0][1]:1;
    const byDate={}; TASKS.forEach(t=>{if(!byDate[t.date])byDate[t.date]={t:0,d:0};byDate[t.date].t++;if(t.status==='done')byDate[t.date].d++});
    const dates = Object.keys(byDate).sort();

    el.innerHTML = `
        <div class="page-header"><div><div class="page-title">📈 Phân Tích Toàn Hệ Thống</div><div class="page-subtitle">${TASKS.length} tasks · ${Object.keys(skillCounts).length} skills · 11 phòng ban</div></div></div>
        <div class="grid">
            <div class="card"><div class="card-head">🧩 Top Skills</div><div class="card-body">${topSk.map(([n,c])=>`
                <div class="chart-bar"><span class="chart-label">${n}</span><div class="chart-track"><div class="chart-fill" style="width:${c/maxSk*100}%;background:var(--purple)">${c}</div></div></div>`).join('')}</div></div>
            <div class="card"><div class="card-head">🤖 Agent / Worker</div><div class="card-body">${agentData.map(d=>`
                <div class="chart-bar"><span class="chart-label">${d.n}</span><div class="chart-track"><div class="chart-fill" style="width:${d.c/maxAg*100}%;background:${d.cl}">${d.c}</div></div></div>`).join('')}</div></div>
            <div class="card"><div class="card-head">🏢 Tasks Theo Phòng Ban</div><div class="card-body">${deptSorted.map(([n,c])=>`
                <div class="chart-bar"><span class="chart-label">${n}</span><div class="chart-track"><div class="chart-fill" style="width:${c/maxD*100}%;background:${DEPT_COLORS[n]||'var(--blue)'}">${c}</div></div><span class="chart-val">${c}</span></div>`).join('')}</div></div>
            <div class="card"><div class="card-head">📅 Tiến Độ</div><div class="card-body"><div class="timeline">${(()=>{let ct=0,cd=0;return dates.map(d=>{ct+=byDate[d].t;cd+=byDate[d].d;return`<div class="tl-item"><div class="tl-date">${d}</div><div class="tl-title">${byDate[d].t} tasks · ${Math.round(cd/ct*100)}%</div><div class="tl-detail">Tổng: ${ct} · Done: ${cd}</div></div>`;}).join('')})()}</div></div></div>
        </div>`;
}

// Auto-refresh 30s
setInterval(()=>{const o=document.querySelector('script[src^="task-data.js"]');if(o)o.remove();const s=document.createElement('script');s.src='task-data.js?t='+Date.now();s.onload=init;document.head.appendChild(s)},30000);

init();
</script>

</html>
