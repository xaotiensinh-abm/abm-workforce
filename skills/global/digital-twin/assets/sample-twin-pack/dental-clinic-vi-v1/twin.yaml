  time_horizon: "daily, weekly and monthly"
operating_model:
  mission: "Chuẩn hóa patient journey để tăng show rate, treatment acceptance và trải nghiệm đồng nhất."
  operating_principles: ["lịch hẹn phải được xác nhận rõ", "chair time là tài nguyên cần điều phối", "mọi thay đổi điều trị phải có consent và follow-up"]
  service_boundaries: ["cover vận hành cơ sở và chăm sóc bệnh nhân", "không mặc định cover quản trị chuỗi đa cơ sở ở cấp tập đoàn"]
  standard_of_execution: "Bệnh nhân luôn có owner ở từng stage, lịch hẹn được xác nhận, kế hoạch điều trị được theo dõi và tái khám không bị rơi."
role_system:
  core_roles: ["Lễ Tân", "Điều Phối Lịch", "Bác Sĩ", "Phụ Tá", "Tư Vấn Điều Trị", "Quản Lý Cơ Sở"]
  responsibilities: ["tiếp nhận và xác nhận lịch", "điều phối ghế và bác sĩ", "khám và điều trị", "chuẩn bị ghế và hỗ trợ điều trị", "chốt kế hoạch điều trị", "giải quyết ngoại lệ vận hành"]
  handoff_patterns: ["lễ tân sang bác sĩ khi bệnh nhân đến", "bác sĩ sang tư vấn khi có kế hoạch điều trị", "tư vấn sang lễ tân hoặc điều phối để chốt lịch và thanh toán", "sau điều trị sang CSKH hoặc lễ tân để recall"]
  escalation_paths: ["escalate khi lịch gấp hoặc cấp cứu", "escalate khi bác sĩ đổi lịch hoặc quá tải ghế", "escalate khi bệnh nhân khiếu nại hoặc có rủi ro sau điều trị"]
process_system:
  core_processes: ["đặt lịch và xác nhận lịch", "tiếp nhận và khám", "tư vấn kế hoạch điều trị", "điều trị và thanh toán", "follow-up sau điều trị và recall tái khám"]
  trigger_map: ["lead hoặc bệnh nhân cũ đặt lịch", "lịch đến hạn xác nhận", "phát sinh điều trị mới", "đến lịch tái khám hoặc nhắc hẹn"]
  input_output_pairs: ["booking request -> lịch hẹn đã xác nhận", "khám ban đầu -> kế hoạch điều trị", "điều trị xong -> hướng dẫn sau điều trị", "danh sách recall -> lịch tái khám mới"]
  sla_expectations: ["lịch ngày hôm sau phải được xác nhận trước cutoff", "thay đổi bác sĩ hoặc ghế phải được thông báo sớm", "follow-up sau điều trị phải đi trong cửa sổ đã định"]
decision_system:
  decision_types: ["lịch hẹn", "xếp ghế", "ưu tiên cấp cứu", "thay đổi bác sĩ", "ưu đãi hoặc xử lý dịch vụ"]
  decision_rules: ["lịch chỉ coi là confirmed khi bệnh nhân xác nhận", "ca cấp cứu hoặc đau cấp tính được ưu tiên ghế", "đổi bác sĩ cần xét mức độ phù hợp chuyên môn và lịch", "điều trị lớn cần có consent và kế hoạch follow-up rõ"]
  approval_layers: ["lễ tân hoặc điều phối trong ngưỡng chuẩn", "clinic manager khi vượt capacity hoặc thay đổi lịch phức tạp", "bác sĩ phụ trách khi liên quan chuyên môn hoặc plan điều trị"]
  exception_rules: ["no-show phải được ghi nhận và đưa vào flow nhắc lại", "mọi thay đổi plan cần cập nhật lại mốc và người phụ trách", "xử lý khiếu nại dịch vụ cần có note và owner follow-up"]
