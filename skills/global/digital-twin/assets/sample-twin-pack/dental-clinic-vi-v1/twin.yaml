  system_roles: ["quản lý lịch hẹn", "theo dõi plan điều trị", "lưu hướng dẫn và policy", "giao việc follow-up"]
  data_dependencies: ["danh sách lịch hẹn", "hồ sơ bệnh nhân", "plan điều trị", "lịch bác sĩ"]
  failure_points: ["lịch chưa xác nhận nhưng không được nhắc", "ghế hoặc bác sĩ quá tải", "bệnh nhân sau điều trị không có owner theo dõi", "plan điều trị bị trôi sau lần khám đầu"]
