# ═══════════════════════════════════════════════
# CONVENTIONS
# ═══════════════════════════════════════════════

conventions:
  directory_naming:
    layer_3: "references/"     # Chuẩn hoá: KHÔNG dùng resources/ hoặc modules/
    layer_4: "examples/"       # Ví dụ I/O
    layer_5: "scripts/"        # Scripts & Tools
    layer_6: "assets/templates/" # Assets & Templates
    
  file_naming:
    skill_definition: "SKILL.md"
    changelog: "CHANGELOG.md"
    readme: "README.md"
    output_contract: "OUTPUT-CONTRACT.md"  # hoặc inline trong SKILL.md
    
  metadata_required:
    - name
    - description
    - metadata.version
    - metadata.worker-id
    - metadata.maturity
    - metadata.category
    - metadata.tags
