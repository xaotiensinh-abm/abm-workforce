# ═══════ SECURITY DOMAIN (W6: SecurityAgent) ═══════
security:

  auth:
    triggers: ["auth", "authentication", "JWT", "OAuth", "session", "login", "RBAC"]
    primary: auth-expert
    composable_with: [jarvis-security-agent]
    exclusive: false
    
  api_security:
    triggers: ["API security", "OWASP", "injection", "XSS", "CSRF", "rate limit"]
    primary: api-security-best-practices
    composable_with: [jarvis-security-agent]
    exclusive: false
    
  vulnerability:
    triggers: ["vulnerability", "CVE", "security scan", "penetration", "supply chain"]
    primary: vulnerability-scanner
    composable_with: [security-auditor]
    exclusive: false
    
  security_audit:
    triggers: ["security audit", "compliance", "DevSecOps", "audit"]
    primary: security-auditor
    exclusive: true

# ═══════ OPS DOMAIN (W7: OpsAgent) ═══════
ops:

  docker:
    triggers: ["docker", "container", "Dockerfile", "docker-compose", "image"]
    primary: docker-expert
    exclusive: true
    
  kubernetes:
    triggers: ["kubernetes", "k8s", "pod", "deployment", "helm", "kubectl"]
    primary: kubernetes-architect
    exclusive: true
    
  terraform:
    triggers: ["terraform", "IaC", "infrastructure as code", "OpenTofu", "module"]
    primary: terraform-specialist
    exclusive: true
    
  cicd:
    triggers: ["CI/CD", "pipeline", "GitHub Actions", "deploy", "deployment"]
    primary: jarvis-ops-agent
    context_signals:
      github_actions: github-actions-expert
      deployment_design: deployment-pipeline-design
      vercel: vercel-deployment
    exclusive: false
    
  incident:
    triggers: ["incident", "outage", "downtime", "SRE", "on-call", "postmortem"]
    primary: incident-responder
    exclusive: true
    
  monitoring:
    triggers: ["monitoring", "observability", "logging", "tracing", "alert", "SLI", "SLO"]
    primary: observability-engineer
    exclusive: true

# ═══════ UTILITY / META SKILLS ═══════
utility:

  # --- Quality & Review (W8: CriticAgent) ---
  quality:
    triggers: ["review", "quality", "audit output", "check"]
    primary: jarvis-critic-agent
    composable_with: [abm-multi-persona-review, evidence-driven-verification]
    exclusive: false
    notes: "Always runs AFTER domain skill, never instead of"
    
  verification:
    triggers: ["verify", "done", "complete", "ship", "finish"]
    primary: verification-before-completion
    composable_with: [evidence-driven-verification]
    exclusive: false
    notes: "Gate function — always runs before marking work complete"
    
  # --- Planning & Process ---
  brainstorming:
    triggers: ["brainstorm", "ideation", "explore", "ý tưởng"]
    primary: brainstorming
    composable_with: [multi-agent-brainstorming]
    exclusive: false
    
  skill_creation:
    triggers: ["create skill", "tạo skill", "new skill", "skill generator"]
    primary: skill-creator-ultra
    exclusive: true
    
  research:
    triggers: ["research", "nghiên cứu", "investigate", "deep dive"]
    primary: research-expert
    exclusive: true

# ═══════ CONFLICT RESOLUTION RULES ═══════
conflict_resolution:
  rules:
    - "RULE 1: Most specific trigger wins (nextjs > react > typescript)"
    - "RULE 2: Domain specialist > generalist (postgres-expert > database-expert)"
    - "RULE 3: Orchestrator/worker skills compose, rarely exclusive"
    - "RULE 4: W8 (Critic) always runs AFTER, never INSTEAD OF domain skill"
    - "RULE 5: Vietnamese text → viet-pro (absolute priority)"
    - "RULE 6: Security concerns → always add jarvis-security-agent as composable"
    
  priority_order:
    - "Language-specific (viet-pro)"
    - "Framework-specific (nextjs, react, prisma...)"
    - "Domain specialist (postgres, mongodb...)"
    - "Domain generalist (database-expert, business-analyst...)"
    - "Worker/Orchestrator (jarvis-code-agent, jarvis-business-agent...)"
    - "Meta/Quality (critic, verifier, optimizer)"
