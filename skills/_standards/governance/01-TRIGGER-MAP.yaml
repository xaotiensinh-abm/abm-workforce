# ═══════════════════════════════════════════════════════════════
# ABM-Workforce Trigger Map v1.0
# Cross-Skill Routing & Conflict Resolution
# ═══════════════════════════════════════════════════════════════
# 
# PURPOSE: Khi user request match nhiều skills, trigger map xác định
# skill NÀO được gọi dựa trên priority + context signals.
#
# RULES:
# 1. Higher priority = được chọn trước
# 2. Khi 2 skills cùng priority → dùng context_signals để phân biệt
# 3. Orchestrator skills (W8/W9) chạy SAU domain skills
# 4. "exclusive: true" = chỉ 1 skill được chọn
# 5. "composable: true" = có thể chạy song song với skill khác
# ═══════════════════════════════════════════════════════════════

version: 1.0
last_updated: 2026-03-28

# ═══════ DEVELOPMENT DOMAIN (W1: CodeAgent) ═══════
development:

  # --- Framework-Specific (Priority 1 — most specific wins) ---
  react:
    triggers: ["react", "jsx", "component", "hooks", "useState", "useEffect"]
    primary: react-expert
    composable_with: [react-performance, state-management-expert]
    exclusive: false
    context_signals:
      performance_issue: react-performance
      state_complexity: state-management-expert
      
  nextjs:
    triggers: ["next.js", "nextjs", "app router", "server components", "RSC", "getServerSideProps"]
    primary: nextjs-expert
    exclusive: true
    notes: "Next.js issues always route here first, even if React-related"
    
  typescript:
    triggers: ["typescript", "type error", "TS2", "interface", "generic", "type inference"]
    primary: typescript-expert
    composable_with: [react-expert, nodejs-expert]
    exclusive: false
    
  nodejs:
    triggers: ["node.js", "nodejs", "express", "event loop", "stream", "buffer", "child_process"]
    primary: nodejs-expert
    exclusive: true
    
  # --- Database (Priority 1) ---
  database:
    triggers: ["database", "query", "index", "migration", "schema"]
    primary: database-expert
    context_signals:
      postgresql: postgres-expert
      mongodb: mongodb-expert
      prisma_orm: prisma-expert
      firebase: firebase
    routing_rule: "If specific DB mentioned → route to specialist. Otherwise → database-expert"
    
  postgres:
    triggers: ["postgresql", "postgres", "pg_", "pgbouncer", "JSONB", "plpgsql"]
    primary: postgres-expert
    exclusive: true
    
  mongodb:
    triggers: ["mongodb", "mongoose", "aggregation pipeline", "sharding", "replica set"]
    primary: mongodb-expert
    exclusive: true
    
  prisma:
    triggers: ["prisma", "schema.prisma", "prisma migrate", "prisma client"]
    primary: prisma-expert
    exclusive: true

  # --- Testing & Quality (Priority 2) ---
  testing:
    triggers: ["test", "testing", "jest", "vitest", "coverage"]
    primary: test-driven-development
    context_signals:
      e2e_browser: playwright-expert
      bug_finding: find-bugs
      debugging: systematic-debugging
    exclusive: false
    
  debugging:
    triggers: ["bug", "error", "debug", "crash", "fix", "broken"]
    primary: systematic-debugging
    composable_with: [find-bugs, oracle]
    context_signals:
      complex_architectural: oracle
      security_related: jarvis-security-agent
    exclusive: false

  # --- API & Architecture (Priority 2) ---
  api:
    triggers: ["API", "REST", "endpoint", "route", "HTTP", "status code"]
    primary: rest-api-expert
    context_signals:
      security: api-security-best-practices
      auth: auth-expert
    exclusive: false

  code_review:
    triggers: ["review", "PR review", "code review", "pull request"]
    primary: code-review
    composable_with: [jarvis-critic-agent]
    exclusive: false

# ═══════ CONTENT DOMAIN (W2: ContentAgent) ═══════
content:

  # --- Vietnamese Content (Priority 1 — language-specific) ---
  vietnamese_writing:
    triggers: ["viết bài", "viết truyện", "content tiếng Việt", "tạo slide", "soạn tài liệu"]
    primary: viet-pro
    exclusive: true
    notes: "ALL Vietnamese content creation routes here. No exceptions."
    
  # --- Enterprise Content (Priority 1) ---
  enterprise_content:
    triggers: ["voice-over", "e-learning", "script", "enterprise content", "audit content"]
    primary: content-forge
    context_signals:
      voiceover_only: enterprise-voiceover-script
    exclusive: true
    
  # --- Marketing/SEO (Priority 2) ---
  seo:
    triggers: ["SEO", "search engine", "ranking", "organic traffic", "keyword"]
    context_signals:
      audit: seo-audit
      writing: seo-content-writer
    routing_rule: "Audit existing → seo-audit. Write new → seo-content-writer"
    exclusive: true
    
  copywriting:
    triggers: ["landing page", "email copy", "conversion", "CTA", "sales copy"]
    primary: copywriting
    exclusive: true
    
  dong_y:
    triggers: ["đông y", "thảo dược", "bác sĩ gia đình", "y học cổ truyền"]
    primary: dongy-content-pipeline
    exclusive: true

