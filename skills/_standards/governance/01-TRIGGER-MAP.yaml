    composable_with: [market-sizing-analysis, competitive-landscape]
    exclusive: false
    
  market_analysis:
    triggers: ["market size", "TAM", "SAM", "SOM", "thị trường"]
    primary: market-sizing-analysis
    exclusive: true
    
  competitor:
    triggers: ["đối thủ", "competitor", "competitive", "Porter", "SWOT"]
    primary: competitive-landscape
    exclusive: true
    
  pricing:
    triggers: ["pricing", "giá", "monetization", "freemium", "subscription"]
    primary: pricing-strategy
    exclusive: true
    
  # --- Operations (Priority 2) ---
  business_analytics:
    triggers: ["KPI", "dashboard", "báo cáo", "analytics", "metrics"]
    primary: business-analyst
    context_signals:
      kpi_design: kpi-dashboard-design
      analytics_tracking: analytics-tracking
    exclusive: false
    
  digital_twin:
    triggers: ["digital twin", "SOP", "quy trình", "policy", "playbook", "onboarding"]
    primary: digital-twin
    exclusive: true
    notes: "Enterprise operating system modeling"
    
  hr:
    triggers: ["tuyển dụng", "HR", "nhân sự", "onboarding", "PTO", "performance review"]
    primary: hr-pro
    exclusive: true

  sales:
    triggers: ["sales", "leads", "prospect", "cold email", "outreach", "pipeline"]
    primary: sales-automator
    exclusive: true

